<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age of War - Mini Jeux</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .game-container {
            width: 100%;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .back-button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            transform: scale(1.05);
        }

        .game-frame {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .game-title {
            font-size: 2rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-controls {
            margin-top: 1rem;
            text-align: center;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <a href="menu.html" class="back-button">Retour au Menu</a>
            <h1 class="game-title">Age of War</h1>
        </div>
        <embed 
            class="game-frame"
            src="games/ageofwar.swf"
            type="application/x-shockwave-flash"
            pluginspage="https://get.adobe.com/flashplayer/"
        >
        <div class="game-controls">
            <p>Utilisez les flèches du clavier pour vous déplacer et attaquer</p>
            <p>Appuyez sur ESPACE pour sauter</p>
        </div>
    </div>
</body>
</html>
